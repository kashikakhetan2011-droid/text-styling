<!DOCTYPE html>
<html>
    <head>
        <style>
            *{
                text-align: center;
                font-family: monospace;
            }
            #text{
                text-shadow: 2px 2px 1px rgba(186, 0, 99, 0.5);
            }
            #box{
                box-shadow: 3px 3px 4px rgba(63, 0, 82, 0.5);
            }
            #indent{
                text-indent: 50%;
            }
        </style>
    </head>
    <body>
        <h1 id="text">This is a text with a shadow.</h1>
        <h1 id="box">This is a box with a shadow.</h1>
        <div>
            <p id="indent">This paragraph has an indent.</p>
            <p>This is a regular paragraph.</p>
        </div>
    </body>
</html>
